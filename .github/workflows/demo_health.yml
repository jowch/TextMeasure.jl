# Demo-health CI (#J) — keeps the examples/ demos from rotting silently.
#
# What it does:
#   * License-audit gate: every examples/*.jl file must carry an SPDX MIT header.
#   * Per-demo matrix: boots each gallery piece in a clean env (plain Pkg.instantiate +
#     Pkg.test; in-repo deps resolved via each piece's [sources] table). Each piece's own
#     test suite carries its DETERMINISTIC GOLDEN (hash the computed layout table, never
#     pixels) + property tests, which therefore run on every PR:
#       - atlas:   geometric LoD/opacity golden + coast-clearance over the dive
#       - tide:    per-band justify golden + measure-once-per-loop invariant
#       - woven:   found-poem geometry golden
#       - layouts: shape_pack invariants (segment_index ∈ range; per-band chords; overflow)
#   * Font pinning: installs DejaVu Sans + Liberation Serif before the CairoMakie pieces
#     render (the gallery pieces also bundle their own OFL fonts under examples/fonts).
#   * Failure-to-issue plumbing: on scheduled/main runs, a demo failure opens/updates a
#     canonical `[demo-health] <demo> regression` issue (deduped); a green run auto-closes it.
#
# Runner scope: ubuntu-latest only. The font-pinning step uses apt (Linux). The spec's
# macOS/Windows matrix dimension is descoped here to keep the apt-based font pinning the
# single source of truth; revisit if cross-OS rendering coverage is wanted later.
name: demo-health

on:
  pull_request:
  schedule:
    - cron: '17 6 * * 1'   # Mondays 06:17 UTC — weekly drift check
  workflow_dispatch:

# issues:write is needed by the failure-to-issue plumbing. It is only exercised on
# scheduled/dispatch/push runs (guarded per-step), never on pull_request, so fork PRs
# (which only ever get a read token) never hit a permissions wall.
permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  license-audit:
    name: License audit (SPDX MIT headers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Audit SPDX MIT headers on examples/*.jl
        run: bash .github/scripts/license_audit.sh

  demos:
    name: ${{ matrix.demo }} (Julia ${{ matrix.version }})
    runs-on: ubuntu-latest
    needs: license-audit
    strategy:
      fail-fast: false
      matrix:
        # Match CI.yml: compat floor + latest stable.
        version: ['1.11', '1']
        # The three gallery pieces + the shared layouts library.
        demo: [atlas, tide, woven, layouts]
    steps:
      - uses: actions/checkout@v6

      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v3

      - name: Pin fonts (DejaVu Sans + Liberation Serif) and PDF tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fonts-dejavu fonts-dejavu-core fonts-liberation poppler-utils
          fc-cache -f
          echo "Pinned font families available to fontconfig:"
          fc-list | grep -Ei 'dejavu sans|liberation serif' | sort | head -20
          # Hard-fail early if the pinned families the CairoMakie demos request are absent.
          fc-list | grep -qi 'DejaVu Sans'      || { echo '::error::DejaVu Sans not installed'; exit 1; }
          fc-list | grep -qi 'Liberation Serif' || { echo '::error::Liberation Serif not installed'; exit 1; }

      - name: Instantiate and run the demo test suite
        id: runtest
        # Plain instantiate+test — no manual Pkg.develop. The unregistered in-repo deps
        # (TextMeasure, and TextMeasureLayouts for the demos that use it) are resolved via
        # each demo's [sources] table in Project.toml. This is the exact flow the per-demo
        # READMEs document, so green CI here means the documented quickstart works too.
        run: |
          julia --color=yes --project=examples/${{ matrix.demo }} -e '
            using Pkg
            Pkg.instantiate()
            Pkg.test()
          '

      # ---- Failure-to-issue plumbing -------------------------------------------------
      # Runs ONLY on scheduled/dispatch/push-to-main runs (never on pull_request, so fork
      # PRs never need a write token), and ONLY on the latest-Julia leg so the two matrix
      # legs don't race on the same issue.
      - name: Open / update regression issue on failure
        if: ${{ failure() && github.event_name != 'pull_request' && matrix.version == '1' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEMO: ${{ matrix.demo }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE="[demo-health] ${DEMO} regression"
          # Exact-title match against OPEN issues (list+jq is robust vs. fuzzy search).
          NUM=$(gh issue list --state open --limit 100 --json number,title \
                  --jq "[.[] | select(.title == \"${TITLE}\")][0].number // empty")
          BODY=$(printf '🔴 Demo-health failed for **%s** on `%s`.\n\nRun: %s\n\n_Filed automatically by the demo-health workflow; it auto-closes on the next green run._' \
                  "$DEMO" "$GITHUB_REF_NAME" "$RUN_URL")
          if [ -n "$NUM" ]; then
            echo "Existing open issue #$NUM — commenting."
            gh issue comment "$NUM" --body "$BODY"
          else
            echo "No open issue — checking for a closed one to reopen."
            CLOSED=$(gh issue list --state closed --limit 100 --json number,title \
                      --jq "[.[] | select(.title == \"${TITLE}\")][0].number // empty")
            if [ -n "$CLOSED" ]; then
              echo "Reopening closed issue #$CLOSED."
              gh issue reopen "$CLOSED"
              gh issue comment "$CLOSED" --body "$BODY"
            else
              echo "Opening a new issue."
              gh issue create --title "$TITLE" --body "$BODY"
            fi
          fi

      - name: Auto-close regression issue on success
        if: ${{ success() && github.event_name != 'pull_request' && matrix.version == '1' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEMO: ${{ matrix.demo }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE="[demo-health] ${DEMO} regression"
          NUM=$(gh issue list --state open --limit 100 --json number,title \
                  --jq "[.[] | select(.title == \"${TITLE}\")][0].number // empty")
          if [ -n "$NUM" ]; then
            echo "Demo green again — closing #$NUM."
            gh issue comment "$NUM" --body "$(printf '✅ Demo-health passed for **%s** again. Auto-closing.\n\nRun: %s' "$DEMO" "$RUN_URL")"
            gh issue close "$NUM"
          else
            echo "No open regression issue for ${DEMO}; nothing to close."
          fi
